services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.14
    container_name: redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --check=false
    ports:
      - "9092:9092"
      - "9644:9644"

  minio:
    image: minio/minio:RELEASE.2023-10-16T04-13-43Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../../data/minio:/data

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: streamforge
    ports:
      - "5432:5432"
    volumes:
      - ../../data/postgres:/var/lib/postgresql/data
      - ../../ops/postgres:/docker-entrypoint-initdb.d

  trino:
    image: trinodb/trino:432
    container_name: trino
    ports:
      - "8081:8080" # Updated to avoid port 8080 conflict
    volumes:
      - ../../ops/trino/etc:/etc/trino
      - ../../data/trino-catalog:/data/hive-catalog
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/info" ]
      interval: 10s
      timeout: 5s
      retries: 5
